name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Grant write access to GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'src/YouTubeAdGame.Web/YouTubeAdGame.Web.csproj'
  PUBLISH_DIR: 'publish'

jobs:
  # ── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Install the Wasm workload so SkiaSharp native assets are linked in
      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --no-restore --configuration Release

      - name: Publish Blazor WASM
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --no-restore \
            --configuration Release \
            --output ${{ env.PUBLISH_DIR }}

      # Fix base href for GitHub Pages sub-path deployment
      # The repo name is used as the sub-path (e.g. /YouTubeAdGame/)
      - name: Fix base href for GitHub Pages
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          INDEX="$PUBLISH_DIR/wwwroot/index.html"
          sed -i "s|<base href=\"/\" />|<base href=\"/$REPO_NAME/\" />|g" "$INDEX"

      # Add a .nojekyll file so GitHub Pages doesn't ignore _framework/
      - name: Add .nojekyll
        run: touch ${{ env.PUBLISH_DIR }}/wwwroot/.nojekyll

      # Cache-bust the service worker so clients pick up updates
      - name: Stamp build version
        run: |
          BUILD_ID="${{ github.sha }}"
          echo "Build: $BUILD_ID" >> ${{ env.PUBLISH_DIR }}/wwwroot/build.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PUBLISH_DIR }}/wwwroot

  # ── Deploy (on push to main/master, or on PRs labelled "deploy") ─────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'deploy'))

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
