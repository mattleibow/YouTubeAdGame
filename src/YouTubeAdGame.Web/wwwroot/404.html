<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // When GitHub Pages returns a 404 for a deep URL (e.g. /YouTubeAdGame/editor),
    // this page encodes the full path into the query string and redirects to the
    // root index.html, which then decodes it and restores the browser history.
    //
    // Based on https://github.com/rafgraph/spa-github-pages
    var pathSegmentsToKeep = 1; // keep the repo-name segment (/YouTubeAdGame)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
</html>
